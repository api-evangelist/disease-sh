    description: >-
      Third-party open API for reliable global disease information, offering
      41 endpoints across COVID-19 statistics (Worldometers, JHUCSSE, NYT,
      Apple, government sources), vaccine and therapeutic coverage, variant
      data, and CDC influenza surveillance data. No authentication is required;
      all responses are JSON.
