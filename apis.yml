aid: disease-sh
name: disease.sh
description: >-
  disease.sh is an open API providing reliable global disease statistics,
  including COVID-19 worldwide and country-level data, US state breakdowns,
  historical case counts, vaccine and therapeutic coverage, influenza outbreak
  data from the CDC, and mobility metrics from Apple and government sources.
  The API is completely free to use, requires no authentication, and supports
  CORS for browser-based integrations.
